name: CI/CD Portfolio - React TS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci

    - name: Construir aplicación (Build)
      run: npm run build

    - name: Verificar build
      run: ls -la dist || echo "❌ No se encontró la carpeta dist"

    # ========================
    # DEPLOY (solo en push a main)
    # ========================
    - name: Configurar SSH y Desplegar
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

        # Verificar conexión SSH
        ssh -v -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "echo '✅ Conexión SSH exitosa'"

        # Transferir solo la carpeta de build (más rápido y limpio)
        rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
          dist/ \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/portfolio/dist/

        # Reiniciar el contenedor en el servidor
        ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd ~/portfolio && \
          docker compose down && \
          docker compose up -d --build
        "

        echo "🚀 Portafolio desplegado correctamente!"