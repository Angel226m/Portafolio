name: CI/CD Portfolio - React TS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci

    - name: Construir aplicación (Build)
      run: npm run build

    - name: Verificar build
      run: ls -la dist

    # ========================
    # DEPLOY (solo cuando se hace push a main)
    # ========================
    - name: Configurar SSH y Desplegar
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

        ssh -v -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "echo '✅ Conexión SSH exitosa'"

        # Crear carpeta principal si no existe
        ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          mkdir -p ~/portfolio/dist
          echo '📂 Carpeta portfolio creada'
        "

        # Transferir TODO el proyecto (excepto cosas innecesarias)
        rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
          --exclude 'node_modules' \
          --exclude '.git' \
          --exclude '.github' \
          --exclude '*.log' \
          ./ \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/portfolio/

        # Ejecutar docker compose
        ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd ~/portfolio && \
          echo '📂 Ahora estamos en:' && pwd && \
          echo 'Archivos en la carpeta:' && ls -la && \
          docker compose down && \
          docker compose up -d --build && \
          echo '✅ Docker Compose ejecutado correctamente'
        "

        echo "🚀 Portafolio desplegado en https://portafolio.angelproyect.com"