
services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angel-portfolio
    ports:
      - "4173:4173"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s